name: secure_exam_app
description: "A Mobile-Based Secure Examination and Quiz System with Facial Verification and Activity Monitoring."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Camera & Face Detection
  camera: ^0.11.0+2
  google_mlkit_face_detection: ^0.11.0

  # Image handling
  image_picker: ^1.1.2

  # Shared preferences for local storage
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true